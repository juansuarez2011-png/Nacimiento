<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNTR0 BioControl - Offline</title>
    
    <!-- CryptoJS para encriptación -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    
    <style>
        /* ===== ESTILOS OFFLINE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 16px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #184E77, #1A759F);
            padding: 20px 24px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .header img {
            max-height: 40px;
            filter: brightness(0) invert(1);
        }
        
        .header h1 {
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .status-bar {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            align-items: center;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .status-online {
            background: #27ae60;
            color: white;
        }
        
        .status-offline {
            background: #e74c3c;
            color: white;
        }
        
        .status-sync {
            background: #f39c12;
            color: white;
        }
        
        .content {
            padding: 24px;
        }
        
        .login-form {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #34495e;
            margin-bottom: 4px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #168AAD;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: #184E77;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #1A759F;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-secondary {
            background: #52B69A;
        }
        
        .btn-secondary:hover {
            background: #34A0A4;
        }
        
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin: 8px 0;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .alert-error {
            background: #fde8e8;
            border-left: 4px solid #e74c3c;
            color: #c0392b;
        }
        
        .alert-success {
            background: #e8f8ed;
            border-left: 4px solid #27ae60;
            color: #1e8449;
        }
        
        .alert-warning {
            background: #fef9e7;
            border-left: 4px solid #f39c12;
            color: #856404;
        }
        
        .hidden {
            display: none !important;
        }
        
        .sync-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            margin: 8px 0;
            font-size: 0.85rem;
            color: #666;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #184E77;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .session-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin: 12px 0;
        }
        
        .session-info .user {
            font-weight: 600;
            color: #184E77;
        }
        
        .session-info .role {
            font-size: 0.8rem;
            padding: 2px 12px;
            border-radius: 12px;
            background: #D9ED92;
            color: #184E77;
        }
        
        .btn-sm {
            padding: 6px 16px;
            font-size: 0.8rem;
            width: auto;
        }
        
        .btn-danger {
            background: #e74c3c;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .btn-group .btn {
            flex: 1;
            min-width: 100px;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .status-bar {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .session-info {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <img src="logo.png" alt="SYNTR0">
            <h1>SYNTR0 BioControl</h1>
        </div>
        <div class="status-bar">
            <span class="status-badge status-offline" id="statusBadge">📡 Sin conexión</span>
            <span id="syncStatus" style="font-size:0.75rem;">⏳ Sin sincronizar</span>
        </div>
    </div>

    <!-- CONTENIDO -->
    <div class="content">
        <!-- Login -->
        <div id="loginView">
            <h2 style="color:#184E77; margin-bottom:16px;">🔐 Iniciar Sesión</h2>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="loginUser" placeholder="Ingrese su usuario" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="Ingrese su contraseña" required>
                </div>
                <div id="loginAlert" class="alert alert-hidden"></div>
                <button type="submit" class="btn">Iniciar Sesión</button>
            </form>
            
            <div style="text-align:center; margin-top:12px; font-size:0.85rem; color:#666;">
                <p>Usuario por defecto: <strong>admin</strong></p>
                <p>Contraseña: <strong>admin123</strong></p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboardView" class="hidden">
            <div class="session-info">
                <div>
                    <span class="user" id="currentUser">👤 admin</span>
                    <span class="role" id="currentRole">Administrador</span>
                </div>
                <button class="btn btn-sm btn-danger" onclick="logout()">🚪 Cerrar Sesión</button>
            </div>
            
            <div id="syncIndicator" class="sync-indicator">
                <span class="spinner" id="syncSpinner"></span>
                <span id="syncMessage">Sincronizando datos...</span>
            </div>
            
            <h3 style="color:#184E77; margin:16px 0 12px;">📊 Panel de Control</h3>
            
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin-bottom:16px;">
                <div style="background:#f8f9fa; padding:12px; border-radius:8px; text-align:center; border-left:4px solid #168AAD;">
                    <div style="font-size:0.7rem; color:#666;">Total Partos</div>
                    <div style="font-size:1.6rem; font-weight:700; color:#184E77;" id="totalPartos">0</div>
                </div>
                <div style="background:#f8f9fa; padding:12px; border-radius:8px; text-align:center; border-left:4px solid #52B69A;">
                    <div style="font-size:0.7rem; color:#666;">Pendientes</div>
                    <div style="font-size:1.6rem; font-weight:700; color:#f39c12;" id="pendingCount">0</div>
                </div>
                <div style="background:#f8f9fa; padding:12px; border-radius:8px; text-align:center; border-left:4px solid #34A0A4;">
                    <div style="font-size:0.7rem; color:#666;">Sincronizados</div>
                    <div style="font-size:1.6rem; font-weight:700; color:#27ae60;" id="syncedCount">0</div>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="syncNow()">🔄 Sincronizar Ahora</button>
                <button class="btn" onclick="verRegistros()">📋 Ver Registros</button>
            </div>
            
            <div id="registrosContainer" style="margin-top:16px;"></div>
        </div>
    </div>
</div>

<script>
    // ===== INICIALIZACIÓN DEL SISTEMA OFFLINE =====
    let currentSession = null;
    let dataManager = null;
    
    // ===== INICIAR APLICACIÓN =====
    async function initApp() {
        try {
            // Inicializar sistema de autenticación
            await authSystem.initDB();
            
            // Inicializar base de datos de datos
            dataManager = new OfflineDataManager();
            await dataManager.initDB();
            
            // Verificar sesión existente
            const session = await authSystem.validateSession();
            if (session) {
                currentSession = session;
                showDashboard();
            } else {
                showLogin();
            }
            
            // Verificar estado de conexión
            updateConnectionStatus();
            
            // Iniciar sincronización automática
            if (syncManager) {
                syncManager.startAutoSync(30000);
            }
            
            // Actualizar estadísticas
            updateStats();
            
        } catch (error) {
            console.error('Error inicializando:', error);
        }
    }

    // ===== MOSTRAR LOGIN =====
    function showLogin() {
        document.getElementById('loginView').classList.remove('hidden');
        document.getElementById('dashboardView').classList.add('hidden');
    }

    // ===== MOSTRAR DASHBOARD =====
    function showDashboard() {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('dashboardView').classList.remove('hidden');
        
        // Mostrar información del usuario
        document.getElementById('currentUser').textContent = '👤 ' + currentSession.username;
        const roleNames = {
            'admin': 'Administrador',
            'manager': 'Gerente',
            'user': 'Usuario'
        };
        document.getElementById('currentRole').textContent = roleNames[currentSession.role] || currentSession.role;
    }

    // ===== MANEJAR LOGIN =====
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        if (!username || !password) {
            showAlert('loginAlert', 'Por favor complete todos los campos', 'error');
            return;
        }
        
        try {
            const result = await authSystem.login(username, password);
            currentSession = result.session;
            showDashboard();
            updateStats();
            
            // Limpiar formulario
            document.getElementById('loginForm').reset();
            
        } catch (error) {
            showAlert('loginAlert', error, 'error');
        }
    });

    // ===== CERRAR SESIÓN =====
    async function logout() {
        if (confirm('¿Está seguro de cerrar sesión?')) {
            await authSystem.logout(currentSession.token);
            currentSession = null;
            showLogin();
        }
    }

    // ===== ACTUALIZAR ESTADO DE CONEXIÓN =====
    function updateConnectionStatus() {
        const badge = document.getElementById('statusBadge');
        const isOnline = navigator.onLine;
        
        if (isOnline) {
            badge.textContent = '✅ En línea';
            badge.className = 'status-badge status-online';
        } else {
            badge.textContent = '📡 Sin conexión';
            badge.className = 'status-badge status-offline';
        }
        
        // Sincronizar estado
        const syncStatus = document.getElementById('syncStatus');
        if (isOnline) {
            syncStatus.textContent = '🔄 Sincronizando...';
            syncNow();
        } else {
            syncStatus.textContent = '⏳ Trabajando offline';
        }
    }

    // ===== SINCRONIZAR AHORA =====
    async function syncNow() {
        const syncIndicator = document.getElementById('syncIndicator');
        const syncMessage = document.getElementById('syncMessage');
        const syncSpinner = document.getElementById('syncSpinner');
        
        try {
            syncIndicator.classList.remove('hidden');
            syncMessage.textContent = '⏳ Sincronizando datos...';
            syncSpinner.classList.remove('hidden');
            
            await syncManager.syncNow();
            
            syncMessage.textContent = '✅ Sincronización completada';
            
            setTimeout(() => {
                syncIndicator.classList.add('hidden');
            }, 3000);
            
            updateStats();
            
        } catch (error) {
            syncMessage.textContent = '❌ Error al sincronizar';
            console.error('Error en sincronización:', error);
        }
    }

    // ===== ACTUALIZAR ESTADÍSTICAS =====
    async function updateStats() {
        try {
            // Obtener total de partos
            const partos = await dataManager.getAllData('partos');
            document.getElementById('totalPartos').textContent = partos.length;
            
            // Obtener pendientes
            const pending = await dataManager.getPendingSync();
            const pendingCount = pending.filter(p => !p.synced).length;
            document.getElementById('pendingCount').textContent = pendingCount;
            
            // Obtener sincronizados
            const synced = pending.filter(p => p.synced).length;
            document.getElementById('syncedCount').textContent = synced;
            
        } catch (error) {
            console.error('Error actualizando estadísticas:', error);
        }
    }

    // ===== VER REGISTROS =====
    async function verRegistros() {
        const container = document.getElementById('registrosContainer');
        
        try {
            const partos = await dataManager.getAllData('partos');
            
            if (partos.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">No hay registros disponibles</div>';
                return;
            }
            
            let html = '<div style="overflow-x:auto; border:1px solid #e0e0e0; border-radius:8px;">';
            html += `<table style="width:100%; border-collapse:collapse; font-size:0.85rem; min-width:500px;">
                <thead style="background:#184E77; color:white;">
                    <tr>
                        <th style="padding:8px 12px; text-align:left;">Fecha</th>
                        <th style="padding:8px 12px; text-align:left;">Finca</th>
                        <th style="padding:8px 12px; text-align:left;">Madre</th>
                        <th style="padding:8px 12px; text-align:left;">Evento</th>
                    </tr>
                </thead>
                <tbody>`;
            
            partos.slice(0, 10).forEach(p => {
                html += `<tr>
                    <td style="padding:6px 12px; border-bottom:1px solid #f0f0f0;">${p.fecha || 'N/A'}</td>
                    <td style="padding:6px 12px; border-bottom:1px solid #f0f0f0;">${p.finca || 'N/A'}</td>
                    <td style="padding:6px 12px; border-bottom:1px solid #f0f0f0;">${p.madre || 'N/A'}</td>
                    <td style="padding:6px 12px; border-bottom:1px solid #f0f0f0;"><span style="background:#D9ED92; padding:2px 10px; border-radius:12px; font-size:0.75rem;">${p.evento || 'N/A'}</span></td>
                </tr>`;
            });
            
            html += `</tbody></table>`;
            if (partos.length > 10) {
                html += `<div style="padding:8px 12px; background:#f8f9fa; text-align:center; font-size:0.8rem; color:#666;">Mostrando 10 de ${partos.length} registros</div>`;
            }
            html += '</div>';
            
            container.innerHTML = html;
            
        } catch (error) {
            container.innerHTML = `<div class="alert alert-error">Error al cargar registros: ${error}</div>`;
        }
    }

    // ===== MOSTRAR ALERTA =====
    function showAlert(elementId, message, type = 'error') {
        const alert = document.getElementById(elementId);
        alert.textContent = message;
        alert.className = 'alert alert-' + type;
        alert.classList.remove('hidden');
        
        setTimeout(() => {
            alert.classList.add('hidden');
        }, 5000);
    }

    // ===== EVENTOS DE CONEXIÓN =====
    window.addEventListener('online', () => {
        updateConnectionStatus();
        syncNow();
    });
    
    window.addEventListener('offline', updateConnectionStatus);

    // ===== INICIAR APLICACIÓN =====
    document.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>

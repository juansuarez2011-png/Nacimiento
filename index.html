<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNTR0 BioControl - Offline</title>
    <style>
        /* ===== ESTILOS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #D9ED92;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #184E77, #1A759F);
            padding: 20px 24px;
            text-align: center;
            color: white;
        }

        .header img {
            max-height: 50px;
            filter: brightness(0) invert(1);
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .header .sub {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .content {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #34495e;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #168AAD;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #184E77;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #1A759F;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #52B69A;
        }

        .btn-secondary:hover {
            background: #34A0A4;
        }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .alert-error {
            background: #fde8e8;
            border-left: 4px solid #e74c3c;
            color: #c0392b;
        }

        .alert-success {
            background: #e8f8ed;
            border-left: 4px solid #27ae60;
            color: #1e8449;
        }

        .alert-hidden {
            display: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 16px;
        }

        .badge-online {
            color: #27ae60;
            font-weight: 600;
        }

        .badge-offline {
            color: #e74c3c;
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .user-info .name {
            font-weight: 700;
            color: #184E77;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 16px 0;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #168AAD;
        }

        .stat-card .num {
            font-size: 1.4rem;
            font-weight: 700;
            color: #184E77;
        }

        .stat-card .label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }

        .btn-group .btn {
            flex: 1;
        }

        .registros-table {
            overflow-x: auto;
            margin-top: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .registros-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 400px;
        }

        .registros-table th {
            background: #184E77;
            color: white;
            padding: 8px 10px;
            text-align: left;
        }

        .registros-table td {
            padding: 6px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .registros-table tr:hover td {
            background: #D9ED92;
        }

        .default-msg {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            .content {
                padding: 16px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <img src="LOGO.png" alt="SYNTR0" onerror="this.style.display='none'">
        <h1>SYNTR0 BioControl</h1>
        <div class="sub">Sistema de Registro Offline</div>
    </div>

    <div class="content">
        <!-- ===== LOGIN ===== -->
        <div id="loginView">
            <h2 style="color:#184E77; margin-bottom:16px;">🔐 Iniciar Sesión</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="loginUser" value="admin" placeholder="Ingrese su usuario">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" value="admin123" placeholder="Ingrese su contraseña">
                </div>
                <div id="loginAlert" class="alert alert-hidden"></div>
                <button type="submit" class="btn">Iniciar Sesión</button>
            </form>
            <div style="text-align:center; margin-top:12px; font-size:0.8rem; color:#999;">
                Usuario: <strong>admin</strong> | Contraseña: <strong>admin123</strong>
            </div>
        </div>

        <!-- ===== DASHBOARD ===== -->
        <div id="dashboardView" class="hidden">
            <!-- Estado -->
            <div class="status-bar">
                <span id="statusText">📡 Sin conexión</span>
                <span id="syncText">⏳ Pendiente</span>
            </div>

            <!-- Usuario -->
            <div class="user-info">
                <span class="name" id="currentUser">👤 admin</span>
                <button class="btn btn-danger" style="width:auto; padding:6px 16px; font-size:0.8rem;" onclick="logout()">Salir</button>
            </div>

            <!-- Estadísticas -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="num" id="totalRegistros">0</div>
                    <div class="label">Total</div>
                </div>
                <div class="stat-card" style="border-left-color:#f39c12;">
                    <div class="num" id="pendientes">0</div>
                    <div class="label">Pendientes</div>
                </div>
                <div class="stat-card" style="border-left-color:#27ae60;">
                    <div class="num" id="sincronizados">0</div>
                    <div class="label">Sincronizados</div>
                </div>
            </div>

            <!-- Botones -->
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="syncNow()">🔄 Sincronizar</button>
                <button class="btn" onclick="verRegistros()">📋 Ver Registros</button>
            </div>

            <!-- Registros -->
            <div id="registrosContainer"></div>
        </div>
    </div>
</div>

<script>
    // =====================================================
    //  SISTEMA OFFLINE SIMPLIFICADO - SIN PROTOCOLOS COMPLEJOS
    // =====================================================

    // ----- USUARIOS PREDEFINIDOS (encriptados localmente) -----
    const USERS = {
        'admin': {
            password: btoa('admin123'),  // Base64 simple
            role: 'admin'
        },
        'user': {
            password: btoa('user123'),
            role: 'user'
        }
    };

    // ----- VARIABLES GLOBALES -----
    let currentUser = null;
    let db = JSON.parse(localStorage.getItem('syntro_data')) || { partos: [] };
    let pendientes = JSON.parse(localStorage.getItem('syntro_pendientes')) || [];

    // =====================================================
    //  FUNCIONES DE AUTENTICACIÓN (SIMPLE Y OFFLINE)
    // =====================================================

    // Iniciar sesión
    function login(username, password) {
        const user = USERS[username];
        if (!user) return { success: false, error: 'Usuario no encontrado' };
        
        if (user.password !== btoa(password)) {
            return { success: false, error: 'Contraseña incorrecta' };
        }

        currentUser = { username, role: user.role };
        localStorage.setItem('syntro_session', JSON.stringify(currentUser));
        
        return { success: true, user: currentUser };
    }

    // Verificar sesión actual
    function checkSession() {
        const session = localStorage.getItem('syntro_session');
        if (session) {
            try {
                currentUser = JSON.parse(session);
                return currentUser;
            } catch {
                return null;
            }
        }
        return null;
    }

    // Cerrar sesión
    function logout() {
        currentUser = null;
        localStorage.removeItem('syntro_session');
        showLogin();
    }

    // =====================================================
    //  FUNCIONES DE DATOS (OFFLINE)
    // =====================================================

    // Guardar registro
    function guardarRegistro(data) {
        const registro = {
            id: Date.now() + '_' + Math.random().toString(36).substring(2, 6),
            ...data,
            fecha: new Date().toISOString(),
            sincronizado: false
        };
        
        db.partos.push(registro);
        localStorage.setItem('syntro_data', JSON.stringify(db));
        
        // Agregar a pendientes
        pendientes.push({ id: registro.id, data: registro });
        localStorage.setItem('syntro_pendientes', JSON.stringify(pendientes));
        
        return registro;
    }

    // Obtener todos los registros
    function getRegistros() {
        return db.partos || [];
    }

    // Obtener pendientes
    function getPendientes() {
        return pendientes.filter(p => !p.sincronizado);
    }

    // Marcar como sincronizado
    function marcarSincronizado(id) {
        const item = pendientes.find(p => p.id === id);
        if (item) {
            item.sincronizado = true;
            localStorage.setItem('syntro_pendientes', JSON.stringify(pendientes));
        }
    }

    // =====================================================
    //  FUNCIONES DE SINCRONIZACIÓN (SIMULADA)
    // =====================================================

    function syncNow() {
        const pendientesList = getPendientes();
        
        if (pendientesList.length === 0) {
            alert('✅ No hay datos pendientes de sincronización');
            return;
        }

        // Simular sincronización con servidor
        let sincronizados = 0;
        pendientesList.forEach(p => {
            // Aquí iría la llamada real al servidor
            console.log('Sincronizando:', p.data);
            marcarSincronizado(p.id);
            sincronizados++;
        });

        alert(`✅ ${sincronizados} registros sincronizados correctamente`);
        actualizarStats();
    }

    // =====================================================
    //  FUNCIONES DE UI
    // =====================================================

    function showLogin() {
        document.getElementById('loginView').classList.remove('hidden');
        document.getElementById('dashboardView').classList.add('hidden');
    }

    function showDashboard() {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('dashboardView').classList.remove('hidden');
        document.getElementById('currentUser').textContent = '👤 ' + currentUser.username;
        actualizarStats();
        actualizarEstadoConexion();
    }

    function actualizarStats() {
        const total = db.partos.length;
        const pend = getPendientes().length;
        const sync = pendientes.filter(p => p.sincronizado).length;

        document.getElementById('totalRegistros').textContent = total;
        document.getElementById('pendientes').textContent = pend;
        document.getElementById('sincronizados').textContent = sync;
    }

    function actualizarEstadoConexion() {
        const online = navigator.onLine;
        const status = document.getElementById('statusText');
        const sync = document.getElementById('syncText');
        
        if (online) {
            status.textContent = '✅ En línea';
            status.style.color = '#27ae60';
        } else {
            status.textContent = '📡 Offline';
            status.style.color = '#e74c3c';
        }

        const pend = getPendientes().length;
        sync.textContent = pend > 0 ? `⏳ ${pend} pendientes` : '✅ Sincronizado';
    }

    function verRegistros() {
        const container = document.getElementById('registrosContainer');
        const registros = getRegistros();

        if (registros.length === 0) {
            container.innerHTML = '<div class="default-msg">📭 No hay registros guardados</div>';
            return;
        }

        let html = `<div class="registros-table">
            <table>
                <thead><tr>
                    <th>Fecha</th>
                    <th>Finca</th>
                    <th>Madre</th>
                    <th>Evento</th>
                    <th>Estado</th>
                </tr></thead>
                <tbody>`;

        registros.slice(-10).reverse().forEach(r => {
            const sync = pendientes.find(p => p.id === r.id);
            const estado = sync?.sincronizado ? '✅' : '⏳';
            html += `<tr>
                <td>${r.fecha?.split('T')[0] || 'N/A'}</td>
                <td>${r.finca || 'N/A'}</td>
                <td>${r.madre || 'N/A'}</td>
                <td><span style="background:#D9ED92; padding:2px 10px; border-radius:12px; font-size:0.75rem;">${r.evento || 'N/A'}</span></td>
                <td>${estado}</td>
            </tr>`;
        });

        html += `</tbody></table>
            <div style="padding:8px 12px; background:#f8f9fa; font-size:0.75rem; color:#666; text-align:center;">
                Mostrando últimos 10 de ${registros.length} registros
            </div>
        </div>`;

        container.innerHTML = html;
    }

    function mostrarAlerta(id, mensaje, tipo = 'error') {
        const el = document.getElementById(id);
        el.textContent = mensaje;
        el.className = `alert alert-${tipo}`;
        el.classList.remove('alert-hidden');
        setTimeout(() => el.classList.add('alert-hidden'), 4000);
    }

    // =====================================================
    //  EVENTOS
    // =====================================================

    // Login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();

        if (!user || !pass) {
            mostrarAlerta('loginAlert', 'Complete todos los campos', 'error');
            return;
        }

        const result = login(user, pass);
        if (result.success) {
            showDashboard();
        } else {
            mostrarAlerta('loginAlert', result.error, 'error');
        }
    });

    // Enter key en login
    document.getElementById('loginPassword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
    });

    // Eventos de conexión
    window.addEventListener('online', () => {
        actualizarEstadoConexion();
        if (getPendientes().length > 0) {
            if (confirm('📡 Conexión recuperada. ¿Desea sincronizar ahora?')) {
                syncNow();
            }
        }
    });

    window.addEventListener('offline', actualizarEstadoConexion);

    // =====================================================
    //  INICIALIZACIÓN
    // =====================================================

    function init() {
        const session = checkSession();
        if (session) {
            currentUser = session;
            showDashboard();
        } else {
            showLogin();
        }
        
        // Si no hay datos, crear uno de ejemplo
        if (db.partos.length === 0) {
            db.partos.push({
                id: 'demo_001',
                finca: 'Finca Ejemplo',
                madre: 'V001',
                evento: 'Normal',
                fecha: new Date().toISOString(),
                sincronizado: true
            });
            localStorage.setItem('syntro_data', JSON.stringify(db));
        }
    }

    // Iniciar
    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
